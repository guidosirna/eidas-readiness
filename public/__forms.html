<html>
  <head><title>Forms</title></head>
  <body>
    <!-- Assessment form -->
    <form name="assessment" data-netlify="true" hidden>
      <input type="hidden" name="form-name" value="assessment" />
      <input name="name" />
      <input name="company" />
      <input name="email" />
      <input name="industry" />
      <input name="company_size" />
      <input name="score" />
      <input name="percentage" />
      <input name="level" />
      <input name="weak_areas" />
      <input name="area_legal" />
      <input name="area_technical" />
      <input name="area_security" />
      <input name="area_organizational" />
      <input name="area_documentation" />
      <input name="area_integration" />
    </form>

    <!-- Newsletter form -->
    <form name="newsletter" data-netlify="true" hidden>
      <input type="hidden" name="form-name" value="newsletter" />
      <input name="email" />
      <input name="source" />
    </form>

    <!-- Content gate form -->
    <form name="content-gate" data-netlify="true" hidden>
      <input type="hidden" name="form-name" value="content-gate" />
      <input name="email" />
      <input name="source" />
      <input name="page" />
    </form>
  </body>
</html>
